name: Build EDCloud

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: EDCloud-Linux
            ext: ""
          - os: macos-latest
            artifact: EDCloud-macOS
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libfuse-dev fuse pkg-config xvfb

      - name: Install dependencies
        run: |
          pip install requests pystray Pillow fusepy pyinstaller
        shell: bash

      - name: Build (Linux with virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run python -m PyInstaller EDCloud.spec --distpath dist --noconfirm

      - name: Build (macOS)
        if: runner.os != 'Linux'
        run: python -m PyInstaller EDCloud.spec --distpath dist --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/EDCloud${{ matrix.ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mv artifacts/EDCloud-Linux/EDCloud EDCloud-Linux
          mv artifacts/EDCloud-macOS/EDCloud EDCloud-macOS
          chmod +x EDCloud-Linux EDCloud-macOS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EDCloud-Linux
            EDCloud-macOS
